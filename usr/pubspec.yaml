name: couldai_user_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # PowerSync & Database
  # Downgrading to 1.7.2 to avoid 'Deprecated.subclass' error in 1.8.0
  powersync: ^1.7.2
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0
  
  # Supabase (Common backend for PowerSync)
  supabase_flutter: ^2.8.0
  
  # Utils
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
